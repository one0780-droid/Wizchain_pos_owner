<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WizPOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f5f5; --surface:#fff; --border:#e8e8e8;
  --accent:#00a86b; --text:#111; --muted:#888;
  --warn:#e03e1a; --gold:#b8860b; --purple:#5b2be8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}
body{max-width:430px;margin:0 auto;position:relative}

/* ── 페이지 전환 ── */
.page{display:none;min-height:100vh;flex-direction:column}
.page.on{display:flex}

/* ════════════════════
   PAGE 1: 지갑 연결
════════════════════ */
#pg-wallet{align-items:center;justify-content:center;padding:40px 24px;background:var(--bg)}
.logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:52px;letter-spacing:-1px;line-height:1;margin-bottom:8px}
.logo span{color:var(--accent)}
.tagline{font-size:13px;color:var(--muted);letter-spacing:3px;margin-bottom:16px}
.wiz-badge{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--border);border-radius:20px;padding:6px 16px;margin-bottom:44px}
.wiz-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.wiz-name{font-size:13px;font-weight:700;color:var(--accent)}
.wiz-by{font-size:12px;color:var(--muted)}
.wallet-box{width:100%;max-width:340px}
.err-box{background:#fff0ee;border:2px solid var(--warn);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--warn);margin-bottom:16px;display:none}
.load-box{text-align:center;padding:12px;font-size:14px;color:var(--muted);display:none}
.w-btn{width:100%;display:flex;align-items:center;gap:16px;background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer;text-align:left}
.w-btn:active{opacity:.75}
.w-btn.mm{border-color:#f6851b}
.w-btn.tw{border-color:#3375ff}
.w-btn.wc{border-color:#3b99fc}
.w-btn-icon{font-size:30px;flex-shrink:0}
.w-btn-name{font-size:17px;font-weight:700;color:var(--text)}
.w-btn-desc{font-size:13px;color:var(--muted)}
.w-btn-arr{margin-left:auto;font-size:18px;color:var(--muted)}
.net-note{text-align:center;margin-top:20px;font-size:12px;color:var(--muted);line-height:1.8}

/* ════════════════════
   PAGE 2: 매장 등록
════════════════════ */
#pg-register{background:var(--bg);padding:52px 24px 40px}
.reg-title{font-size:26px;font-weight:900;margin-bottom:6px}
.reg-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.connected-addr{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:28px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.conn-addr{font-family:monospace;font-size:14px;font-weight:700;color:var(--accent)}
.form-group{margin-bottom:18px}
.form-label{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:7px;display:block}
.form-input{width:100%;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:12px;font-size:16px;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-select{width:100%;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:12px;font-size:16px;color:var(--text);font-family:'Noto Sans KR',sans-serif;appearance:none}
.reg-btn{width:100%;padding:17px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px}

/* ════════════════════
   APP 헤더
════════════════════ */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50}
.app-logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:22px;letter-spacing:-0.5px}
.app-logo span{color:var(--accent)}
.app-store{font-size:13px;color:var(--muted);font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px}
.chain-live{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--accent);font-weight:700}
.chain-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}

/* ── 탭 바 ── */
.tab-bar{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:14px 8px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-bottom:3px solid transparent;transition:all .15s}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ════════════════════
   PAGE 3: 주문 관리
════════════════════ */
#pg-orders{background:var(--bg)}
.orders-body{flex:1;overflow-y:auto;padding:12px 16px 80px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px}

.order-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden}
.order-card.new-order{border-color:var(--accent)}
.oc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.oc-no{font-size:16px;font-weight:700}
.oc-time{font-size:12px;color:var(--muted)}
.oc-status{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.oc-status.new{background:#e8faf2;color:var(--accent)}
.oc-status.making{background:#fff8e1;color:#f59e0b}
.oc-status.done{background:#f0f0f0;color:var(--muted)}
.oc-items{padding:12px 16px;border-bottom:1px solid var(--border)}
.oc-item-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.oc-item-row:last-child{margin-bottom:0}
.oc-item-name{color:var(--muted)}
.oc-item-price{font-weight:700}
.oc-foot{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.oc-total{font-size:18px;font-weight:900}
.oc-btns{display:flex;gap:8px}
.oc-btn{padding:9px 16px;border:2px solid var(--border);background:transparent;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text)}
.oc-btn.accept{background:var(--accent);border-color:var(--accent);color:#fff}
.oc-btn.complete{background:var(--text);border-color:var(--text);color:#fff}

/* ════════════════════
   PAGE 4: 메뉴 관리
════════════════════ */
#pg-menus{background:var(--bg)}
.menus-body{flex:1;overflow-y:auto;padding:12px 16px 100px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:4px}
.section-title{font-size:17px;font-weight:900}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

.menu-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.mc-emoji{font-size:28px;width:50px;height:50px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:16px;font-weight:700;margin-bottom:2px}
.mc-cat{font-size:13px;color:var(--muted);margin-bottom:4px}
.mc-price{font-size:15px;font-weight:900}
.mc-rw{font-size:12px;color:var(--accent);font-weight:700;margin-left:6px}
.mc-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.mc-toggle{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:2px solid var(--border);background:transparent;color:var(--text)}
.mc-toggle.soldout{background:#fff0ee;border-color:var(--warn);color:var(--warn)}
.mc-del{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:2px solid var(--border);background:transparent;color:var(--muted)}

/* 메뉴 추가 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
.modal-bg.on{display:flex}
.modal{background:var(--surface);width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;padding:24px 20px 40px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:900;margin-bottom:20px}
.modal-form-group{margin-bottom:14px}
.modal-label{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block}
.modal-input{width:100%;padding:13px 14px;background:var(--bg);border:2px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-save{width:100%;padding:16px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px}
.modal-cancel{width:100%;padding:13px;background:transparent;border:2px solid var(--border);border-radius:12px;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px}

/* ════════════════════
   PAGE 5: 매출 통계
════════════════════ */
#pg-stats{background:var(--bg)}
.stats-body{flex:1;overflow-y:auto;padding:12px 16px 80px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:16px}
.stat-label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:900}
.stat-val.green{color:var(--accent)}
.stat-val.gold{color:var(--gold)}
.stat-val.purple{color:var(--purple)}

.tx-section{background:var(--surface);border:2px solid var(--border);border-radius:14px;overflow:hidden}
.tx-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700}
.tx-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-left{}
.tx-items{font-size:14px;color:var(--muted);margin-bottom:2px}
.tx-time{font-size:12px;color:var(--muted)}
.tx-amount{font-size:17px;font-weight:900}
</style>
</head>
<body>

<!-- ══════════════════════════
     PAGE 1: 지갑 연결
══════════════════════════ -->
<div class="page on" id="pg-wallet">
  <div class="logo">Wiz<span>POS</span></div>
  <div class="tagline">더 편한 글로벌 올인원 포스</div>
  <div class="wiz-badge">
    <div class="wiz-dot"></div>
    <span class="wiz-name">WizChain</span>
    <span class="wiz-by">by WizClass</span>
  </div>
  <div class="wallet-box">
    <div class="err-box" id="errBox"></div>
    <div class="load-box" id="loadBox">연결 중...</div>
    <button class="w-btn mm" onclick="connectMM()">
      <span class="w-btn-icon">🦊</span>
      <div>
        <div class="w-btn-name">MetaMask</div>
        <div class="w-btn-desc">브라우저 익스텐션 / 모바일 앱</div>
      </div>
      <span class="w-btn-arr">→</span>
    </button>
    <button class="w-btn tw" onclick="connectTW()">
      <span class="w-btn-icon">🛡️</span>
      <div>
        <div class="w-btn-name">Trust Wallet</div>
        <div class="w-btn-desc">모바일 앱으로 연결</div>
      </div>
      <span class="w-btn-arr">→</span>
    </button>
    <button class="w-btn wc" onclick="connectWC()">
      <span class="w-btn-icon">🔗</span>
      <div>
        <div class="w-btn-name">WalletConnect</div>
        <div class="w-btn-desc">300+ 지갑 QR 연결</div>
      </div>
      <span class="w-btn-arr">→</span>
    </button>
    <div class="net-note">WizChain (Chain ID: 10243)<br>연결 시 자동으로 네트워크 전환</div>
  </div>
</div>

<!-- ══════════════════════════
     PAGE 2: 매장 등록
══════════════════════════ -->
<div class="page" id="pg-register">
  <div class="reg-title">매장 등록</div>
  <div class="reg-sub">처음 이용하시나요? 매장 정보를 입력해주세요.</div>
  <div class="connected-addr">
    <div class="conn-dot"></div>
    <span class="conn-addr" id="connAddr">0x...</span>
  </div>
  <div class="form-group">
    <label class="form-label">매장명 *</label>
    <input class="form-input" id="regName" placeholder="예: 위즈카페 강남점">
  </div>
  <div class="form-group">
    <label class="form-label">카테고리</label>
    <select class="form-select" id="regCat">
      <option>☕ 카페</option>
      <option>🍖 한식</option>
      <option>🍕 양식</option>
      <option>🥐 베이커리</option>
      <option>🍜 면류</option>
      <option>🍱 분식</option>
      <option>🛒 편의점</option>
      <option>기타</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">주소</label>
    <input class="form-input" id="regAddr" placeholder="예: 서울 강남구 테헤란로 123">
  </div>
  <button class="reg-btn" onclick="registerStore()">매장 등록하기 →</button>
</div>

<!-- ══════════════════════════
     PAGE 3: 주문 관리
══════════════════════════ -->
<div class="page" id="pg-orders">
  <div class="app-header">
    <div>
      <div class="app-logo">Wiz<span>POS</span></div>
      <div class="app-store" id="storeName">매장명</div>
    </div>
    <div class="header-right">
      <div class="chain-live">
        <div class="chain-dot"></div>
        WizChain
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn on" onclick="switchTab('orders',this)">📋 주문</button>
    <button class="tab-btn" onclick="switchTab('menus',this)">🍽 메뉴</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📊 매출</button>
  </div>
  <div class="orders-body" id="ordersBody">
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">아직 주문이 없습니다</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════
     PAGE 4: 메뉴 관리
══════════════════════════ -->
<div class="page" id="pg-menus">
  <div class="app-header">
    <div>
      <div class="app-logo">Wiz<span>POS</span></div>
      <div class="app-store" id="storeNameM">매장명</div>
    </div>
    <div class="header-right">
      <div class="chain-live">
        <div class="chain-dot"></div>
        WizChain
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn" onclick="switchTab('orders',this)">📋 주문</button>
    <button class="tab-btn on" onclick="switchTab('menus',this)">🍽 메뉴</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📊 매출</button>
  </div>
  <div class="menus-body">
    <div class="section-header">
      <div class="section-title" id="menuCount">메뉴 0개</div>
      <button class="add-btn" onclick="openAddMenu()">+ 메뉴 추가</button>
    </div>
    <div id="menuCards"></div>
  </div>
</div>

<!-- ══════════════════════════
     PAGE 5: 매출 통계
══════════════════════════ -->
<div class="page" id="pg-stats">
  <div class="app-header">
    <div>
      <div class="app-logo">Wiz<span>POS</span></div>
      <div class="app-store" id="storeNameS">매장명</div>
    </div>
    <div class="header-right">
      <div class="chain-live">
        <div class="chain-dot"></div>
        WizChain
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn" onclick="switchTab('orders',this)">📋 주문</button>
    <button class="tab-btn" onclick="switchTab('menus',this)">🍽 메뉴</button>
    <button class="tab-btn on" onclick="switchTab('stats',this)">📊 매출</button>
  </div>
  <div class="stats-body">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">오늘 매출</div>
        <div class="stat-val green" id="statSales">₩0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">주문 건수</div>
        <div class="stat-val purple" id="statCount">0건</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">OZ 지급</div>
        <div class="stat-val gold" id="statOZ">0 OZ</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">활성 메뉴</div>
        <div class="stat-val" id="statMenus">0개</div>
      </div>
    </div>
    <div class="tx-section">
      <div class="tx-header">주문 내역</div>
      <div id="txList">
        <div style="text-align:center;padding:32px;color:var(--muted);font-size:14px">아직 주문 내역이 없습니다</div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════
     메뉴 추가 모달
══════════════════════════ -->
<div class="modal-bg" id="addMenuModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">메뉴 추가</div>
    <div class="modal-form-group">
      <label class="modal-label">메뉴명 *</label>
      <input class="modal-input" id="mName" placeholder="예: 아메리카노">
    </div>
    <div class="modal-row">
      <div class="modal-form-group">
        <label class="modal-label">카테고리</label>
        <input class="modal-input" id="mCat" placeholder="예: 커피">
      </div>
      <div class="modal-form-group">
        <label class="modal-label">이모지</label>
        <input class="modal-input" id="mEmoji" placeholder="☕" style="font-size:20px;text-align:center">
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-form-group">
        <label class="modal-label">가격 (원) *</label>
        <input class="modal-input" id="mPrice" type="number" placeholder="4500">
      </div>
      <div class="modal-form-group">
        <label class="modal-label">OZ 배율</label>
        <input class="modal-input" id="mReward" type="number" placeholder="1" step="0.5">
      </div>
    </div>
    <div class="modal-form-group">
      <label class="modal-label">설명</label>
      <input class="modal-input" id="mDesc" placeholder="예: 진한 에스프레소">
    </div>
    <button class="modal-save" onclick="saveMenu()">저장</button>
    <button class="modal-cancel" onclick="closeAddMenu()">취소</button>
  </div>
</div>

<script>
/* ── 상태 ── */
let walletAddr = '';
let store = null;       // { name, cat, addr, wallet }
let menus = [];         // [{ id, name, cat, emoji, price, reward, desc, soldout }]
let orders = [];        // [{ id, no, items, total, oz, status, time }]
let nextMenuId = 1;
let nextOrderId = 1;

/* ── 페이지 전환 ── */
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0, 0);
}

function switchTab(tab, el) {
  const map = { orders:'pg-orders', menus:'pg-menus', stats:'pg-stats' };
  // 탭 버튼 active 동기화
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  // 해당 페이지의 같은 탭 버튼들도 모두 off
  el.classList.add('on');
  // 같은 인덱스 위치의 다른 페이지 탭도 on 처리
  const idx = Array.from(el.parentElement.children).indexOf(el);
  document.querySelectorAll('.tab-bar').forEach(bar => {
    bar.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('on', i===idx));
  });
  if (tab === 'stats') updateStats();
  if (tab === 'menus') renderMenuCards();
  if (tab === 'orders') renderOrders();
  goPage(map[tab]);
}

/* ── 에러/로딩 ── */
function showErr(msg) { const e=document.getElementById('errBox'); e.textContent=msg; e.style.display='block'; }
function hideErr() { document.getElementById('errBox').style.display='none'; }
function showLoad(v) { document.getElementById('loadBox').style.display=v?'block':'none'; }

/* ── ethereum 감지 ── */
function detectEthereum() {
  return new Promise(resolve => {
    if (window.ethereum) return resolve(window.ethereum);
    if (window.web3?.currentProvider) return resolve(window.web3.currentProvider);
    let n = 0;
    const t = setInterval(() => {
      if (window.ethereum) { clearInterval(t); resolve(window.ethereum); }
      else if (++n > 30) { clearInterval(t); resolve(null); }
    }, 100);
  });
}

/* ── 지갑 연결 공통 ── */
async function connectWallet(provider) {
  hideErr(); showLoad(true);
  try {
    if (typeof ethers === 'undefined') throw new Error('ethers 로드 실패. 새로고침하세요.');
    const bp = new ethers.BrowserProvider(provider);
    await bp.send('eth_requestAccounts', []);
    const signer = await bp.getSigner();
    walletAddr = await signer.getAddress();
    // WizChain 전환
    try {
      await provider.request({ method:'wallet_switchEthereumChain', params:[{chainId:'0x27F3'}] });
    } catch(e) {
      if (e.code===4902 || e.code===-32603) {
        try {
          await provider.request({ method:'wallet_addEthereumChain', params:[{
            chainId:'0x27F3', chainName:'WizChain',
            nativeCurrency:{name:'WCN',symbol:'WCN',decimals:18},
            rpcUrls:['https://rpc.wizclass.net']
          }]});
        } catch(_) {}
      }
    }
    localStorage.setItem('wizpos_addr', walletAddr);
    // 기존 매장 있으면 대시보드, 없으면 매장 등록
    const savedStore = localStorage.getItem('wizpos_store');
    if (savedStore) {
      store = JSON.parse(savedStore);
      menus = JSON.parse(localStorage.getItem('wizpos_menus') || '[]');
      nextMenuId = menus.length ? Math.max(...menus.map(m=>m.id)) + 1 : 1;
      enterDashboard();
    } else {
      document.getElementById('connAddr').textContent = walletAddr.slice(0,6)+'...'+walletAddr.slice(-4);
      goPage('pg-register');
    }
  } catch(e) {
    if (e.code===4001) showErr('연결을 취소했습니다.');
    else showErr('연결 실패: ' + (e.message || String(e)));
  }
  showLoad(false);
}

async function connectMM() {
  hideErr();
  const p = await detectEthereum();
  if (!p) { window.location.href = 'https://metamask.app.link/dapp/' + location.host + location.pathname; return; }
  await connectWallet(p);
}
async function connectTW() {
  hideErr();
  const p = await detectEthereum();
  if (!p) { window.location.href = 'https://link.trustwallet.com/open_url?coin_id=60&url=' + encodeURIComponent(location.href); return; }
  await connectWallet(p);
}
async function connectWC() {
  hideErr();
  const p = await detectEthereum();
  if (!p) { window.location.href = 'https://metamask.app.link/dapp/' + location.host + location.pathname; return; }
  await connectWallet(p);
}

/* ── 매장 등록 ── */
function registerStore() {
  const name = document.getElementById('regName').value.trim();
  if (!name) { alert('매장명을 입력해주세요.'); return; }
  store = {
    name,
    cat: document.getElementById('regCat').value,
    addr: document.getElementById('regAddr').value.trim(),
    wallet: walletAddr
  };
  localStorage.setItem('wizpos_store', JSON.stringify(store));
  enterDashboard();
}

/* ── 대시보드 진입 ── */
function enterDashboard() {
  document.querySelectorAll('.app-store').forEach(el => el.textContent = store.name);
  renderOrders();
  goPage('pg-orders');
}

/* ── 주문 렌더 ── */
function renderOrders() {
  const body = document.getElementById('ordersBody');
  if (!orders.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">아직 주문이 없습니다</div></div>`;
    return;
  }
  // 최신순
  const sorted = [...orders].reverse();
  body.innerHTML = sorted.map(o => `
    <div class="order-card${o.status==='new'?' new-order':''}">
      <div class="oc-head">
        <div>
          <div class="oc-no">#${o.no}</div>
          <div class="oc-time">${o.time}</div>
        </div>
        <span class="oc-status ${o.status}">${statusLabel(o.status)}</span>
      </div>
      <div class="oc-items">
        ${o.items.map(i=>`
          <div class="oc-item-row">
            <span class="oc-item-name">${i.emoji} ${i.name} ×${i.qty}</span>
            <span class="oc-item-price">₩${(i.price*i.qty).toLocaleString()}</span>
          </div>`).join('')}
      </div>
      <div class="oc-foot">
        <div class="oc-total">₩${o.total.toLocaleString()}</div>
        <div class="oc-btns">
          ${o.status==='new' ? `<button class="oc-btn accept" onclick="setStatus(${o.id},'making')">수락</button>` : ''}
          ${o.status==='making' ? `<button class="oc-btn complete" onclick="setStatus(${o.id},'done')">완료</button>` : ''}
          ${o.status==='done' ? `<span style="font-size:13px;color:var(--muted)">완료됨 ✓</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function statusLabel(s) {
  return {new:'신규 주문', making:'제조 중', done:'완료'}[s] || s;
}

function setStatus(id, status) {
  const o = orders.find(x => x.id===id);
  if (o) { o.status = status; renderOrders(); updateStats(); }
}

/* 테스트용 더미 주문 추가 */
function addDemoOrder() {
  const sampleItems = menus.filter(m=>!m.soldout).slice(0,2).map(m=>({...m,qty:1}));
  if (!sampleItems.length) { alert('메뉴를 먼저 추가해주세요.'); return; }
  const total = sampleItems.reduce((s,i)=>s+i.price,0);
  const oz = sampleItems.reduce((s,i)=>s+i.price/100*i.reward,0);
  const no = String(Date.now()).slice(-6);
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  orders.push({ id:nextOrderId++, no, items:sampleItems, total, oz, status:'new', time });
  renderOrders();
  updateStats();
}

/* ── 메뉴 관리 ── */
function renderMenuCards() {
  const cnt = document.getElementById('menuCount');
  cnt.textContent = `메뉴 ${menus.length}개`;
  if (!menus.length) {
    document.getElementById('menuCards').innerHTML = `
      <div class="empty-state" style="padding:48px 20px">
        <div class="empty-icon">🍽</div>
        <div class="empty-text">메뉴를 추가해주세요</div>
      </div>`;
    return;
  }
  document.getElementById('menuCards').innerHTML = menus.map(m => `
    <div class="menu-card">
      <div class="mc-emoji">${m.emoji||'🍽'}</div>
      <div class="mc-info">
        <div class="mc-name">${m.name}${m.soldout?' <span style="font-size:11px;color:var(--warn)">[품절]</span>':''}</div>
        <div class="mc-cat">${m.cat}</div>
        <div>
          <span class="mc-price">₩${m.price.toLocaleString()}</span>
          <span class="mc-rw">${m.reward}x OZ</span>
        </div>
      </div>
      <div class="mc-actions">
        <button class="mc-toggle${m.soldout?' soldout':''}" onclick="toggleSoldout(${m.id})">${m.soldout?'판매재개':'품절처리'}</button>
        <button class="mc-del" onclick="deleteMenu(${m.id})">삭제</button>
      </div>
    </div>
  `).join('');
}

function openAddMenu() { document.getElementById('addMenuModal').classList.add('on'); }
function closeAddMenu() {
  document.getElementById('addMenuModal').classList.remove('on');
  ['mName','mCat','mEmoji','mPrice','mReward','mDesc'].forEach(id => document.getElementById(id).value='');
}

function saveMenu() {
  const name = document.getElementById('mName').value.trim();
  const price = parseInt(document.getElementById('mPrice').value);
  if (!name || !price) { alert('메뉴명과 가격은 필수입니다.'); return; }
  const menu = {
    id: nextMenuId++,
    name,
    cat: document.getElementById('mCat').value.trim() || '기타',
    emoji: document.getElementById('mEmoji').value.trim() || '🍽',
    price,
    reward: parseFloat(document.getElementById('mReward').value) || 1,
    desc: document.getElementById('mDesc').value.trim(),
    soldout: false
  };
  menus.push(menu);
  saveMenus();
  renderMenuCards();
  updateStats();
  closeAddMenu();
}

function toggleSoldout(id) {
  const m = menus.find(x=>x.id===id);
  if (m) { m.soldout=!m.soldout; saveMenus(); renderMenuCards(); updateStats(); }
}

function deleteMenu(id) {
  if (!confirm('메뉴를 삭제할까요?')) return;
  menus = menus.filter(x=>x.id!==id);
  saveMenus();
  renderMenuCards();
  updateStats();
}

function saveMenus() { localStorage.setItem('wizpos_menus', JSON.stringify(menus)); }

/* ── 매출 통계 ── */
function updateStats() {
  const done = orders.filter(o=>o.status==='done');
  const total = done.reduce((s,o)=>s+o.total,0);
  const oz = done.reduce((s,o)=>s+o.oz,0);
  document.getElementById('statSales').textContent = '₩'+total.toLocaleString();
  document.getElementById('statCount').textContent = done.length+'건';
  document.getElementById('statOZ').textContent = oz.toFixed(1)+' OZ';
  document.getElementById('statMenus').textContent = menus.filter(m=>!m.soldout).length+'개';
  // 주문 내역
  const txList = document.getElementById('txList');
  if (!done.length) {
    txList.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted);font-size:14px">완료된 주문이 없습니다</div>';
    return;
  }
  txList.innerHTML = [...done].reverse().map(o=>`
    <div class="tx-row">
      <div class="tx-left">
        <div class="tx-items">${o.items.map(i=>`${i.name} ×${i.qty}`).join(', ')}</div>
        <div class="tx-time">#${o.no} · ${o.time}</div>
      </div>
      <div class="tx-amount">₩${o.total.toLocaleString()}</div>
    </div>
  `).join('');
}

/* ── 모달 배경 클릭 닫기 ── */
document.getElementById('addMenuModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddMenu();
});

/* ── 초기화 ── */
window.addEventListener('DOMContentLoaded', function() {
  const saved = localStorage.getItem('wizpos_addr');
  if (saved && window.ethereum) {
    window.ethereum.request({method:'eth_accounts'}).then(accounts => {
      if (accounts.length) {
        walletAddr = accounts[0];
        const savedStore = localStorage.getItem('wizpos_store');
        if (savedStore) {
          store = JSON.parse(savedStore);
          menus = JSON.parse(localStorage.getItem('wizpos_menus') || '[]');
          nextMenuId = menus.length ? Math.max(...menus.map(m=>m.id)) + 1 : 1;
          enterDashboard();
        } else {
          document.getElementById('connAddr').textContent = walletAddr.slice(0,6)+'...'+walletAddr.slice(-4);
          goPage('pg-register');
        }
      }
    }).catch(()=>{});
  }
});
</script>
